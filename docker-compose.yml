services:
  # UltrasoundPig API (เชื่อมต่อ AWS RDS)
  api:
    image : apiultrasoundswine-api:latest
    #build:
    #  context: .
    #  args:
    #    - MYAPI_PORT=${MYAPI_PORT:-3014}

    # config/.env is the real runtime configuration. Do not run without it.
    env_file:
      - config/.env
    container_name: ai-ultrasound-swine
    restart: unless-stopped
    ports:
      - "${MYAPI_PORT:-3014}:${MYAPI_PORT:-3014}" 

    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${MYAPI_PORT:-3014}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

    #  {เครื่อง host} : {/app Ubantu}
    volumes:
      - ./app/uploads:/app/app/uploads
      - ./app/asset:/app/app/asset
      - ./app/detections:/app/app/detections
      - ./logs:/app/logs
    #   - ./:/app  # mount แก้ logic และเปลี่ยนแปลงทันที

    networks:
      - ultrasoundpig_network
    healthcheck:
      # test: ["CMD", "curl", "-f", "http://localhost:${MYAPI_PORT:-3014}/docs"]
      test: ["CMD-SHELL", "curl -f http://localhost:${MYAPI_PORT:-3014}/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ultrasoundpig_network:
    driver: bridge 
