services:
  api:
    image: apiultrasoundswine-api:latest

    # config/.env is the real runtime configuration. Do not run without it.
    env_file:
      - config/.env
    container_name: ai-ultrasound-swine
    restart: unless-stopped
    ports:
      - "${MYAPI_PORT:-3014}:${MYAPI_PORT:-3014}"

    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${MYAPI_PORT:-3014}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

    volumes:
      - ./app/uploads:/app/app/uploads
      - ./app/asset:/app/app/asset
      - ./app/detections:/app/app/detections

    networks:
      - ultrasoundpig_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/version' % os.environ.get('MYAPI_PORT', '3014'), timeout=5).read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ultrasoundpig_network:
    driver: bridge
